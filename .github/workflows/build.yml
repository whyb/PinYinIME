name: Build and Package

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed for creating releases

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      # ── 1. Checkout with submodules ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── 2. Create default runtime files ───────────────────────
      - name: Create default config & user dict
        run: |
          @"
          # PinyinIME Settings
          useTraditional=0
          bgColor=15724527
          borderColor=11842740
          textColor=3289650
          indexColor=13107200
          inputColor=13107200
          fontSize=18
          candidateCount=5
          verticalLayout=0
          fuzzyZ_Zh=0
          fuzzyC_Ch=0
          fuzzyS_Sh=0
          fuzzyN_L=0
          fuzzyF_H=0
          fuzzyEn_Eng=0
          fuzzyIn_Ing=0
          smartCorrection=1
          autoWordCreate=1
          autoFreqAdjust=1
          chinesePunctuation=1
          toggleHotkey=16
          toggleModifier=17
          "@ | Out-File -FilePath pinyin_config.ini -Encoding utf8

          "# PinyinIME User Dictionary" | Out-File -FilePath user.dict -Encoding utf8

      # ── 3. Configure CMake (VS 2022, x64, Release) ───────────
      - name: Configure CMake
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build ─────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── 5. Stage and package ─────────────────────────────────
      - name: Create ZIP package
        run: |
          $staging = "staging\PinyinIME"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          Copy-Item build\Release\PinyinIME.exe -Destination $staging\
          Copy-Item build\Release\PinyinIMETSF.dll -Destination $staging\
          Copy-Item build\Release\PinyinIMEDictService.exe -Destination $staging\
          Copy-Item build\Release\dict_compiler.exe -Destination $staging\
          Copy-Item build\Release\cn_dicts\ -Destination $staging\cn_dicts\ -Recurse
          Copy-Item pinyin_config.ini -Destination $staging\
          Copy-Item user.dict -Destination $staging\

          # dict.bin is NOT pre-built. It gets compiled at install time by
          # the registration wizard (dict_compiler.exe cn_dicts dict.bin).
          # We ship the source YAML files + the compiler, not the binary.

          Write-Host "=== Staged files ==="
          Get-ChildItem $staging -Recurse | ForEach-Object {
              $sizeKB = if ($_.Length) { [math]::Round($_.Length / 1KB, 1) } else { 0 }
              Write-Host "  $($_.FullName.Replace($pwd.Path + '\staging\', '')) ($sizeKB KB)"
          }

          Compress-Archive -Path "$staging\*" -DestinationPath PinyinIME-windows-x64.zip -Force

          $zipSize = [math]::Round((Get-Item PinyinIME-windows-x64.zip).Length / 1MB, 1)
          Write-Host "ZIP created: PinyinIME-windows-x64.zip ($zipSize MB)"

      # ── 6a. Upload artifact (all pushes) ─────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PinyinIME-windows-x64
          path: PinyinIME-windows-x64.zip
          retention-days: 30

      # ── 6b. Create draft release (tags only) ─────────────────
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: PinyinIME-windows-x64.zip
          body: |
            ## 📦 PinyinIME ${{ github.ref_name }}

            极简拼音输入法 — 基于 [rime-ice](https://github.com/iDvel/rime-ice) 词库。

            ### 使用方法
            1. 解压 `PinyinIME-windows-x64.zip`
            2. 以**管理员身份**运行 `PinyinIME.exe`（全局键盘钩子需要）
            3. 按 **Ctrl+Shift**（默认）切换中英文模式
            4. 中文模式下输入拼音：**空格**确认，**数字 1-9** 选词

            ### 包含文件
            | 文件 | 说明 |
            |---|---|
            | `PinyinIME.exe` | 配置工具 (设置 + 注册/卸载 + 托盘) |
            | `PinyinIMETSF.dll` | TSF 文本服务 (注入到应用进程) |
            | `PinyinIMEDictService.exe` | 后台词库服务 (开机自启, IPC 查词) |
            | `dict_compiler.exe` | 离线词库编译器 (注册时自动运行) |
            | `cn_dicts/` | rime-ice 原版 YAML 词库 (编译器输入) |
            | `pinyin_config.ini` | 默认配置文件 |
            | `user.dict` | 用户自学习词库 |

            ### 安装方法
            1. 解压 `PinyinIME-windows-x64.zip`
            2. 以**管理员身份**运行 `PinyinIME.exe`
            3. 点击 **"注册到系统"** 按钮
            4. 注册向导会自动: 编译词库 → 启动后台服务 → 注册 TSF → 设置开机自启
            5. 按 **Win+Space** 切换到 "PinyinIME" 即可使用

            ### 架构
            三层分立: DLL (TSF 注入) + Service (后台查词, mmap 零膨胀加载) + EXE (配置管理)。
            dict.bin 不在压缩包中 — 由注册向导在安装时自动编译生成。

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
